<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>مع القرآن · With the Quran</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: rgba(201, 168, 76, 0.15);
      --gold-glow: rgba(201, 168, 76, 0.3);
      --bg: #080808;
      --surface: #0e0e0e;
      --surface2: #141414;
      --surface3: #1a1a1a;
      --border: rgba(201, 168, 76, 0.12);
      --border-hover: rgba(201, 168, 76, 0.3);
      --text: #e8e0d0;
      --text-muted: #7a7060;
      --text-dim: #4a4540;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Atmospheric background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 80% 100%, rgba(201,168,76,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: -1;
      opacity: 0.4;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* ── Header ── */
    header {
      padding: 12px 0 40px;
      text-align: center;
      position: relative;
    }

    .header-ornament {
      display: block;
      font-size: 1.4rem;
      color: var(--gold);
      opacity: 0.5;
      margin-bottom: 16px;
      letter-spacing: 0.3em;
    }

    .title-arabic {
      font-family: 'Noto Naskh Arabic', serif;
      font-size: 2rem;
      color: var(--gold);
      direction: rtl;
      display: block;
      margin-bottom: 6px;
      text-shadow: 0 0 40px rgba(201,168,76,0.4);
      animation: fadeDown 0.8s ease both;
    }

    .title-english {
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      letter-spacing: 0.35em;
      color: var(--text-muted);
      text-transform: uppercase;
      animation: fadeDown 0.8s 0.1s ease both;
    }

    .header-line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 24px auto 0;
      animation: fadeDown 0.8s 0.2s ease both;
    }

    .top-nav {
      display: flex;
      justify-content: flex-end;
      padding: 20px 0 0;
      position: relative;
      z-index: 10;
    }
    .nav-link {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.3s;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 4px;
      position: relative;
      z-index: 10;
    }
    .nav-link:hover { color: var(--gold); }
    .nav-link::before {
      content: '';
      display: block;
      width: 16px;
      height: 1px;
      background: currentColor;
      transition: width 0.3s;
    }
    .nav-link:hover::before { width: 24px; }

    /* ── Subtitle ── */
    .subtitle {
      text-align: center;
      font-size: 1.05rem;
      color: var(--text-muted);
      font-style: italic;
      margin-bottom: 36px;
      font-weight: 300;
      animation: fadeUp 0.8s 0.3s ease both;
    }

    /* ── Journal textarea ── */
    .journal-wrap {
      position: relative;
      animation: fadeUp 0.8s 0.4s ease both;
    }

    .journal-label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 10px;
      display: block;
    }

    textarea {
      width: 100%;
      min-height: 160px;
      padding: 20px 22px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      line-height: 1.8;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      resize: vertical;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    textarea::placeholder { color: var(--text-dim); font-style: italic; }
    textarea:focus {
      border-color: var(--border-hover);
      box-shadow: 0 0 0 1px rgba(201,168,76,0.08), inset 0 0 30px rgba(201,168,76,0.03);
    }

    /* ── Submit button ── */
    .submit-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      margin-top: 14px;
      padding: 14px 28px;
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--bg);
      background: linear-gradient(135deg, #c9a84c 0%, #e8c97a 50%, #c9a84c 100%);
      background-size: 200% 200%;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: background-position 0.4s, transform 0.2s, box-shadow 0.3s;
      box-shadow: 0 4px 24px rgba(201,168,76,0.2);
    }
    .submit-btn:hover {
      background-position: right center;
      box-shadow: 0 6px 32px rgba(201,168,76,0.35);
      transform: translateY(-1px);
    }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn.loading { opacity: 0.7; pointer-events: none; }

    /* Spinner */
    .spinner {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .submit-btn.loading .spinner { display: block; }
    .submit-btn.loading .btn-text { opacity: 0.6; }

    /* ── Results ── */
    #results {
      margin-top: 48px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .section-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards;
    }
    .section-divider span {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      color: var(--text-dim);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .section-divider::before, .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    /* ── Ayah card ── */
    .ayah-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 32px 28px;
      margin-bottom: 2px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(16px);
      animation: cardIn 0.5s ease forwards;
    }
    .ayah-card:first-of-type { border-radius: 4px 4px 2px 2px; }
    .ayah-card:last-of-type  { border-radius: 2px 2px 4px 4px; margin-bottom: 28px; }

    .ayah-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, transparent, var(--gold), transparent);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .ayah-card:hover::before { opacity: 1; }
    .ayah-card:hover { border-color: var(--border-hover); }

    .ayah-number {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--gold);
      opacity: 0.6;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .ayah-arabic {
      font-family: 'Noto Naskh Arabic', serif;
      direction: rtl;
      font-size: 1.65rem;
      line-height: 2.2;
      color: #f0e8d8;
      text-align: right;
      margin-bottom: 20px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }

    .ayah-english {
      font-size: 1.1rem;
      line-height: 1.85;
      color: #c8bfa8;
      font-style: italic;
      font-weight: 300;
      margin-bottom: 16px;
    }

    .ayah-ref {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-align: right;
    }

    /* Bookmark button */
    .bookmark-btn {
      position: absolute;
      top: 16px; right: 16px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 1rem;
      padding: 4px;
      transition: color 0.3s, transform 0.2s;
      line-height: 1;
    }
    .bookmark-btn:hover { color: var(--gold); transform: scale(1.15); }
    .bookmark-btn.saved { color: var(--gold); }

    /* ── Comfort box ── */
    .comfort-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-top: 2px solid var(--gold);
      border-radius: 4px;
      padding: 28px;
      margin-bottom: 28px;
      opacity: 0;
      animation: cardIn 0.5s ease forwards;
    }

    .comfort-label {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .comfort-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--gold-dim), transparent);
    }

    .comfort-text {
      font-size: 1.12rem;
      line-height: 1.85;
      color: #c8bfa8;
      font-style: italic;
      font-weight: 300;
    }

    /* ── Emotion section ── */
    .emotion-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px 28px;
      opacity: 0;
      animation: cardIn 0.5s ease forwards;
    }

    .emotion-detected {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .emotion-label {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .emotion-pill {
      display: inline-block;
      padding: 3px 12px;
      border: 1px solid var(--gold);
      border-radius: 2px;
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      color: var(--gold);
      text-transform: capitalize;
      background: var(--gold-dim);
    }

    .emotion-after-label {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 10px;
      display: block;
    }

    .emotion-input-row {
      display: flex;
      gap: 10px;
    }

    .emotion-input-row input {
      flex: 1;
      padding: 10px 14px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      background: var(--surface3);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 3px;
      outline: none;
      transition: border-color 0.3s;
    }
    .emotion-input-row input:focus { border-color: var(--border-hover); }
    .emotion-input-row input::placeholder { color: var(--text-dim); font-style: italic; }

    .save-btn {
      padding: 10px 20px;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--gold);
      border: none;
      border-radius: 3px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, transform 0.15s;
    }
    .save-btn:hover { background: var(--gold-light); transform: translateY(-1px); }

    /* Loading state */
    .loading-state {
      text-align: center;
      padding: 48px 0;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
    }
    .loading-dots {
      display: inline-flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .loading-dots span {
      width: 6px; height: 6px;
      background: var(--gold);
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
      opacity: 0.3;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    .loading-text {
      font-size: 0.85rem;
      color: var(--text-dim);
      font-style: italic;
      letter-spacing: 0.05em;
    }

    /* ── Animations ── */
    @keyframes fadeDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:none; } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(12px);  } to { opacity:1; transform:none; } }
    @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
    @keyframes cardIn   { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
    @keyframes spin     { to { transform: rotate(360deg); } }
    @keyframes pulse    { 0%,100% { opacity:0.3; transform:scale(1);   }
                          50%     { opacity:1;   transform:scale(1.4); } }

    /* Staggered card delays */
    .ayah-card:nth-child(1) { animation-delay: 0.05s; }
    .ayah-card:nth-child(2) { animation-delay: 0.15s; }
    .ayah-card:nth-child(3) { animation-delay: 0.25s; }
    .comfort-card           { animation-delay: 0.35s; }
    .emotion-card           { animation-delay: 0.45s; }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface3);
      border: 1px solid var(--border-hover);
      color: var(--gold);
      padding: 10px 22px;
      border-radius: 3px;
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="wrapper">

  <nav class="top-nav">
    <a href="history.html" class="nav-link">Journal History</a>
  </nav>

  <header>
    <span class="header-ornament">✦ ✦ ✦</span>
    <span class="title-arabic">مع القرآن</span>
    <span class="title-english">With the Quran</span>
    <div class="header-line"></div>
  </header>

  <p class="subtitle">Pour your heart out. Let the Quran respond.</p>

  <div class="journal-wrap">
    <span class="journal-label">Today's Reflection</span>
    <textarea id="entry" rows="6" placeholder="Write what is weighing on your heart…"></textarea>
    <button class="submit-btn" onclick="submitEntry()" id="submitBtn">
      <div class="spinner"></div>
      <span class="btn-text">Seek Guidance</span>
    </button>
  </div>

  <div id="results"></div>

</div>

<div class="toast" id="toast"></div>

<script>
  let currentEntryId = null;

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  async function submitEntry() {
    const entry = document.getElementById("entry").value.trim();
    if (!entry) return;

    const btn = document.getElementById("submitBtn");
    const resultsDiv = document.getElementById("results");

    btn.classList.add("loading");
    resultsDiv.innerHTML = `
      <div class="loading-state">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <div class="loading-text">Searching for words that heal…</div>
      </div>`;

    try {
      const response = await fetch("http://localhost:8000/match-ayahs", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ entry, top_n: 3 })
      });

      const data = await response.json();
      btn.classList.remove("loading");
      resultsDiv.innerHTML = "";

      // Divider
      const div = document.createElement("div");
      div.className = "section-divider";
      div.innerHTML = `<span>Ayahs for You</span>`;
      resultsDiv.appendChild(div);

      // Ayah cards
      data.matches.forEach((match, i) => {
        const card = document.createElement("div");
        card.className = "ayah-card";
        card.innerHTML = `
          <button class="bookmark-btn" title="Save Ayah" onclick="toggleBookmark(this, ${match.ayah_index})">☆</button>
          <div class="ayah-number">Verse ${i + 1} of ${data.matches.length}</div>
          <div class="ayah-arabic">${match.ayah_ar}</div>
          <div class="ayah-english">${match.ayah}</div>
          <div class="ayah-ref">— Surah ${match.surah} · ${match.ayah_no}</div>
        `;
        resultsDiv.appendChild(card);
      });

      // Comfort
      const comfort = document.createElement("div");
      comfort.className = "comfort-card";
      comfort.innerHTML = `
        <div class="comfort-label">🌿 Gentle Reminder</div>
        <div class="comfort-text">${data.comfort}</div>
      `;
      resultsDiv.appendChild(comfort);

      // Emotion
      const emotionCard = document.createElement("div");
      emotionCard.className = "emotion-card";
      emotionCard.innerHTML = `
        <div class="emotion-detected">
          <span class="emotion-label">Detected</span>
          <span class="emotion-pill">${data.emotion_before}</span>
        </div>
        <span class="emotion-after-label">How do you feel after reading?</span>
        <div class="emotion-input-row">
          <input type="text" id="emotionInput" placeholder="e.g. hopeful, calm, grateful…" />
          <button class="save-btn" id="saveEmotionBtn" onclick="submitAfterEmotion(${data.entry_id})">Save</button>
        </div>
      `;
      resultsDiv.appendChild(emotionCard);

      document.getElementById("entry").value = "";
      currentEntryId = data.entry_id;

    } catch (err) {
      btn.classList.remove("loading");
      resultsDiv.innerHTML = `<p style="color:#7a4040;font-style:italic;text-align:center;padding:32px 0;">Could not connect. Please check the backend is running.</p>`;
    }
  }

  async function submitAfterEmotion(entryId) {
    const input = document.getElementById("emotionInput");
    const btn = document.getElementById("saveEmotionBtn");
    const emotion = input.value.trim();
    if (!emotion) return;

    try {
      await fetch("http://localhost:8000/update-emotion", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ entry_id: entryId, emotion_after: emotion })
      });
      btn.textContent = "Saved ✓";
      btn.style.background = "#4a7c59";
      btn.style.color = "#e8f0e8";
      input.value = "";
      showToast("Feeling saved ✦");
      setTimeout(() => {
        btn.textContent = "Save";
        btn.style.background = "";
        btn.style.color = "";
      }, 2500);
    } catch (err) {
      console.error("Error:", err);
    }
  }

  async function toggleBookmark(btn, ayahIndex) {
    const isSaved = btn.classList.contains("saved");
    if (isSaved) {
      try {
        await fetch(`http://localhost:8000/bookmark/${ayahIndex}`, { method: "DELETE" });
        btn.classList.remove("saved");
        btn.textContent = "☆";
        showToast("Bookmark removed");
      } catch(e) {}
    } else {
      try {
        await fetch("http://localhost:8000/bookmark", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ayah_index: ayahIndex, note: "" })
        });
        btn.classList.add("saved");
        btn.textContent = "★";
        showToast("Ayah bookmarked ✦");
      } catch(e) {}
    }
  }
</script>
</body>
</html>
