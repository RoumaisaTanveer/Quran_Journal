<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Qur'an Journal</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <i class="fas fa-moon logo-icon"></i>
        <h1>Qur'an Journal</h1>
      </div>
              <div class="header-controls">
          <div class="theme-toggle" onclick="toggleTheme()">
            <i class="fas fa-moon theme-icon moon"></i>
            <i class="fas fa-sun theme-icon sun"></i>
          </div>
          <a href="spiritual-tools.html" class="history-link">
            <i class="fas fa-mosque"></i>
            Spiritual Tools
          </a>
          <a href="history.html" class="history-link">
            <i class="fas fa-history"></i>
            Journal History
          </a>
        </div>
    </header>

    <section class="intro">
      <h2>🌙 Reflect with Divine Guidance</h2>
      <p>Share your thoughts and discover relevant ayahs with personalized spiritual reflection</p>
    </section>

    <section class="input-section">
      <div class="input-container">
        <textarea id="entry" placeholder="Pour your heart out here... Share your thoughts, feelings, or what's on your mind today."></textarea>
      </div>
      <button class="submit-btn" onclick="submitEntry()">
        <i class="fas fa-paper-plane"></i>
        <span>Reflect</span>
      </button>
    </section>

    <div id="results" class="results"></div>
  </div>

  <script>
    let currentEntryId = null;

    // Theme toggle functionality
    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    }

    // Load saved theme or default to dark
    function loadTheme() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
    }

    // Load theme on page load
    loadTheme();

    async function submitEntry() {
      const entry = document.getElementById("entry").value.trim();
      if (!entry) return;

      const submitBtn = document.querySelector('.submit-btn');
      const btnText = submitBtn.querySelector('span');
      const btnIcon = submitBtn.querySelector('i');
      
      // Show loading state
      submitBtn.classList.add('loading');
      btnIcon.className = 'loading-spinner';
      btnText.textContent = 'Reflecting...';

      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = `
        <div class="loading-state fade-in">
          <i class="fas fa-spinner"></i>
          Seeking divine guidance for your reflection...
        </div>
      `;

      try {
        const response = await fetch("http://localhost:8000/match-ayahs", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ entry, top_n: 3 })
        });

        const data = await response.json();
        resultsDiv.innerHTML = "";

        // Display ayahs
        data.matches.forEach((match, index) => {
          const box = document.createElement("div");
          box.className = "ayah-box fade-in";
          box.style.animationDelay = `${index * 0.2}s`;
          
          box.innerHTML = `
            <div class="ayah arabic">${match.ayah_ar}</div>
            <div class="ayah english">"${match.ayah}"</div>
            <div class="surah">
              <i class="fas fa-bookmark"></i>
              Surah ${match.surah}, Ayah ${match.ayah_no}
            </div>
          `;
          resultsDiv.appendChild(box);
        });

        // Display comfort
        const comfortBox = document.createElement("div");
        comfortBox.className = "comfort-box fade-in";
        comfortBox.style.animationDelay = "0.8s";
        comfortBox.innerHTML = `
          <strong>
            <i class="fas fa-heart"></i>
            Gentle Reminder
          </strong>
          <p>${data.comfort}</p>
        `;
        resultsDiv.appendChild(comfortBox);

        // Emotion input box
        const emotionBox = document.createElement("div");
        emotionBox.className = "emotion-box fade-in";
        emotionBox.style.animationDelay = "1s";
        emotionBox.innerHTML = `
          <div class="emotion-detected">
            <span>💭 Detected emotion:</span>
            <span class="emotion-badge">${data.emotion_before}</span>
          </div>
          <div class="emotion-input-group">
            <label for="emotionInput">How do you feel after this reflection?</label>
            <div class="emotion-input-container">
              <input type="text" id="emotionInput" class="emotion-input" placeholder="Describe your current emotional state...">
              <button class="emotion-btn" onclick="submitAfterEmotion(${data.entry_id})">
                Save Feeling
              </button>
            </div>
          </div>
        `;
        resultsDiv.appendChild(emotionBox);

        // Clear journal input
        document.getElementById("entry").value = "";
        currentEntryId = data.entry_id;

      } catch (err) {
        console.error("Fetch error:", err);
        resultsDiv.innerHTML = `
          <div class="emotion-box fade-in" style="border-color: #ef4444;">
            <strong style="color: #ef4444;">
              <i class="fas fa-exclamation-triangle"></i>
              Connection Error
            </strong>
            <p>Unable to connect to the server. Please check your connection and try again.</p>
          </div>
        `;
      } finally {
        // Reset button state
        submitBtn.classList.remove('loading');
        btnIcon.className = 'fas fa-paper-plane';
        btnText.textContent = 'Reflect';
      }
    }

    async function submitAfterEmotion(entryId) {
      const emotionInput = document.getElementById("emotionInput");
      const button = emotionInput.parentElement.querySelector('.emotion-btn');
      const emotion = emotionInput.value.trim();
      if (!emotion) return;

      const originalText = button.textContent;
      button.textContent = "Saving...";
      button.disabled = true;

      try {
        await fetch("http://localhost:8000/update-emotion", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ entry_id: entryId, emotion_after: emotion })
        });

        // Success state
        button.textContent = "Saved ✓";
        button.classList.add('saved');
        emotionInput.value = "";

        // Reset after 2 seconds
        setTimeout(() => {
          button.textContent = originalText;
          button.classList.remove('saved');
          button.disabled = false;
        }, 2000);

      } catch (err) {
        console.error("Error saving emotion:", err);
        button.textContent = "Error";
        setTimeout(() => {
          button.textContent = originalText;
          button.disabled = false;
        }, 2000);
      }
    }

    // Enter key submission
    document.getElementById('entry').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        submitEntry();
      }
    });
  </script>
</body>
</html>
