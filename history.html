<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Journal History - Qur'an Journal</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container wide">
    <header class="header">
      <div class="logo">
        <i class="fas fa-history logo-icon"></i>
        <h1>Journal History</h1>
      </div>
             <div class="header-controls">
         <div class="theme-toggle" onclick="toggleTheme()">
           <i class="fas fa-moon theme-icon moon"></i>
           <i class="fas fa-sun theme-icon sun"></i>
         </div>
         <a href="spiritual-tools.html" class="back-link">
           <i class="fas fa-mosque"></i>
           Spiritual Tools
         </a>
         <a href="index.html" class="back-link">
           <i class="fas fa-arrow-left"></i>
           Back to Journal
         </a>
       </div>
    </header>

    <section class="page-title">
      <h2>📖 Your Spiritual Journey</h2>
      <p>Reflect on your past entries and emotional growth</p>
    </section>

    <div id="history-list" class="history-list"></div>
  </div>

  <!-- Modal -->
  <div id="modalOverlay" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalDesc">
    <div class="modal-box">
      <h3 id="modalTitle">
        <i class="fas fa-exclamation-triangle"></i>
        Delete Entry
      </h3>
      <p id="modalDesc">Are you sure you want to delete this journal entry? This action cannot be undone.</p>
      <div class="modal-buttons">
        <button id="confirmDelete" class="confirm" aria-label="Confirm delete entry">
          <i class="fas fa-trash"></i>
          Delete
        </button>
        <button id="cancelDelete" class="cancel" aria-label="Cancel delete entry">
          <i class="fas fa-times"></i>
          Cancel
        </button>
      </div>
    </div>
  </div>

  <script>
    let entryToDelete = null;

    // Theme toggle functionality
    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    }

    // Load saved theme or default to dark
    function loadTheme() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
    }

    // Load theme on page load
    loadTheme();

    // Map emotions to colors, normalize input
    function emotionColor(emotionRaw) {
      if (!emotionRaw) return 'empty';
      const emotion = emotionRaw.toLowerCase().trim();
      const success = ['peaceful', 'happy', 'reflective', 'content', 'grateful', 'hopeful', 'calm', 'blessed'];
      const warning = ['thoughtful', 'contemplative', 'curious', 'wondering', 'questioning'];
      const error = ['sad', 'anxious', 'angry', 'stressed', 'lonely', 'heartbroken', 'tired', 'confused', 'worried', 'frustrated'];

      if (success.includes(emotion)) return 'success';
      if (warning.includes(emotion)) return 'warning';
      if (error.includes(emotion)) return 'error';
      return 'default';
    }

    async function fetchHistory() {
      try {
        const res = await fetch("http://localhost:8000/history");
        if (!res.ok) throw new Error(`HTTP error! Status: ${res.status}`);
        const history = await res.json();
        const historyDiv = document.getElementById("history-list");
        historyDiv.innerHTML = "";

        if (history.length === 0) {
          historyDiv.innerHTML = `
            <div class="empty-state fade-in">
              <i class="fas fa-book-open"></i>
              <h3>No entries yet</h3>
              <p>Your spiritual journey awaits. Start by creating your first journal entry.</p>
              <a href="index.html">Create your first entry</a>
            </div>
          `;
          return;
        }

        // Show newest first
        history.slice().reverse().forEach((item, i) => {
          const entryId = history.length - 1 - i;
          const beforeColor = emotionColor(item.emotion_before);
          const afterColor = emotionColor(item.emotion_after);

          const box = document.createElement("div");
          box.className = "history-item fade-in";
          box.style.animationDelay = `${i * 0.1}s`;

          const afterSpan = (item.emotion_after && item.emotion_after.trim() !== "")
            ? `<span class="emotion-tag ${afterColor}">${item.emotion_after}</span>`
            : `<span class="emotion-tag empty">No reflection yet</span>`;

          box.innerHTML = `
            <button
              title="Delete Entry"
              class="delete-btn"
              onclick="showDeleteModal(${entryId})"
              aria-label="Delete journal entry"
              type="button"
            >
              <i class="fas fa-trash"></i>
            </button>
            <div class="entry">
              <strong>
                <i class="fas fa-feather"></i>
                Journal Entry
              </strong>
              <div class="entry-content">${item.entry}</div>
            </div>
            <div class="emotions">
              <div class="emotion-group">
                <strong>Before:</strong> 
                <span class="emotion-tag ${beforeColor}">${item.emotion_before}</span>
              </div>
              <div class="emotion-group">
                <strong>After:</strong> 
                ${afterSpan}
              </div>
            </div>
          `;
          historyDiv.appendChild(box);
        });
      } catch (err) {
        console.error("Error loading history:", err);
        const historyDiv = document.getElementById("history-list");
        historyDiv.innerHTML = `
          <div class="error-state fade-in">
            <i class="fas fa-exclamation-triangle"></i>
            <h3>Failed to load history</h3>
            <p>Please check your connection and try again.</p>
          </div>
        `;
      }
    }

    function showDeleteModal(id) {
      entryToDelete = id;
      document.getElementById('modalOverlay').classList.add('show');
    }

    function hideDeleteModal() {
      entryToDelete = null;
      document.getElementById('modalOverlay').classList.remove('show');
    }

    async function deleteEntry() {
      if (entryToDelete === null) return;

      const confirmBtn = document.getElementById('confirmDelete');
      const originalText = confirmBtn.innerHTML;
      confirmBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Deleting...';
      confirmBtn.disabled = true;

      try {
        const res = await fetch(`http://localhost:8000/delete-entry/${entryToDelete}`, {
          method: "DELETE"
        });
        const data = await res.json();
        if (data.message === "Deleted") {
          hideDeleteModal();
          fetchHistory();
        } else {
          alert("Failed to delete entry.");
        }
      } catch (err) {
        console.error("Error deleting entry:", err);
        alert("Error deleting entry. Please try again.");
      } finally {
        confirmBtn.innerHTML = originalText;
        confirmBtn.disabled = false;
      }
    }

    // Event listeners
    document.getElementById('confirmDelete').addEventListener('click', deleteEntry);
    document.getElementById('cancelDelete').addEventListener('click', hideDeleteModal);
    
    // Close modal when clicking outside
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) {
        hideDeleteModal();
      }
    });

    // Escape key to close modal
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && document.getElementById('modalOverlay').classList.contains('show')) {
        hideDeleteModal();
      }
    });

    // Load history when page loads
    window.onload = fetchHistory;
  </script>
</body>
</html>
