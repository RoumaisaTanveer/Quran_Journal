<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Journal History · مع القرآن</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: rgba(201, 168, 76, 0.12);
      --gold-glow: rgba(201, 168, 76, 0.25);
      --bg: #080808;
      --surface: #0e0e0e;
      --surface2: #111111;
      --surface3: #181818;
      --border: rgba(201, 168, 76, 0.1);
      --border-hover: rgba(201, 168, 76, 0.28);
      --text: #e8e0d0;
      --text-muted: #7a7060;
      --text-dim: #3e3a34;
      --red: #8b3a3a;
      --red-light: #c05050;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 50% 35% at 50% 0%, rgba(201,168,76,0.05) 0%, transparent 70%),
        radial-gradient(ellipse 30% 50% at 10% 100%, rgba(201,168,76,0.03) 0%, transparent 60%);
      pointer-events: none;
      z-index: -1;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* ── Header ── */
    header {
      padding: 12px 0 36px;
      text-align: center;
      position: relative;
      animation: fadeDown 0.7s ease both;
    }

    .top-nav {
      display: flex;
      justify-content: flex-start;
      padding: 20px 0 0;
      position: relative;
      z-index: 10;
    }
    .back-link {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-decoration: none;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 4px;
      position: relative;
      z-index: 10;
      transition: color 0.3s;
    }
    .back-link:hover { color: var(--gold); }

    .header-ornament {
      display: block;
      font-size: 1.2rem;
      color: var(--gold);
      opacity: 0.4;
      margin-bottom: 14px;
      letter-spacing: 0.3em;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      letter-spacing: 0.3em;
      font-weight: 400;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .header-arabic {
      font-family: 'Amiri', 'Noto Naskh Arabic', serif;
      font-size: 1.4rem;
      color: var(--gold);
      direction: rtl;
      margin-bottom: 4px;
      text-shadow: 0 0 30px rgba(201,168,76,0.3);
    }

    .header-line {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 20px auto 0;
    }

    /* ── Tabs: History / Bookmarks ── */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 36px;
      animation: fadeUp 0.7s 0.15s ease both;
    }

    .tab-btn {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: transparent;
      border: none;
      padding: 12px 24px 10px;
      cursor: pointer;
      position: relative;
      transition: color 0.3s;
    }
    .tab-btn::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 1px;
      background: var(--gold);
      transform: scaleX(0);
      transition: transform 0.3s;
    }
    .tab-btn.active {
      color: var(--gold);
    }
    .tab-btn.active::after { transform: scaleX(1); }
    .tab-btn:hover { color: var(--text-muted); }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 0;
      color: var(--text-dim);
      font-style: italic;
      font-size: 1.05rem;
    }

    /* ── History entries ── */
    .entry-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px 26px;
      margin-bottom: 2px;
      position: relative;
      opacity: 0;
      transform: translateY(12px);
      animation: cardIn 0.5s ease forwards;
      transition: border-color 0.3s;
    }
    .entry-card:hover { border-color: var(--border-hover); }

    .entry-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .entry-date {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .delete-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 0.75rem;
      padding: 4px 6px;
      border-radius: 3px;
      transition: color 0.3s, background 0.2s;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.1em;
    }
    .delete-btn:hover { color: var(--red-light); }

    .entry-text {
      font-size: 1.05rem;
      line-height: 1.75;
      color: #a09880;
      font-style: italic;
      margin-bottom: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .emotion-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .emo-label {
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .emo-tag {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 2px;
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: capitalize;
    }
    .emo-tag.green  { border: 1px solid #4a7c59; color: #6fad88; background: rgba(74,124,89,0.1); }
    .emo-tag.yellow { border: 1px solid var(--gold); color: var(--gold); background: var(--gold-dim); }
    .emo-tag.red    { border: 1px solid #8b3a3a; color: #c07070; background: rgba(139,58,58,0.1); }
    .emo-tag.dim    { border: 1px solid var(--text-dim); color: var(--text-dim); }

    .arrow-sep {
      color: var(--text-dim);
      font-size: 0.7rem;
    }

    /* ── Bookmarks ── */
    .bookmark-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 28px 26px;
      margin-bottom: 2px;
      position: relative;
      opacity: 0;
      animation: cardIn 0.5s ease forwards;
      transition: border-color 0.3s;
    }
    .bookmark-card:hover { border-color: var(--border-hover); }

    .bookmark-arabic {
      font-family: 'Amiri', 'Noto Naskh Arabic', serif;
      direction: rtl;
      font-size: 1.45rem;
      line-height: 2.1;
      color: #f0e8d8;
      text-align: right;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .bookmark-english {
      font-size: 1rem;
      line-height: 1.8;
      color: #a09880;
      font-style: italic;
      margin-bottom: 12px;
    }

    .bookmark-ref {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      color: var(--text-dim);
      text-align: right;
    }

    .remove-bookmark-btn {
      position: absolute;
      top: 14px; right: 14px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 0.85rem;
      transition: color 0.3s;
    }
    .remove-bookmark-btn:hover { color: var(--red-light); }

    /* ── Modal ── */
    #modalOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(4px);
    }
    #modalOverlay.open { display: flex; }

    #modalBox {
      background: #111;
      border: 1px solid var(--border-hover);
      border-radius: 4px;
      padding: 32px 36px;
      max-width: 300px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
      animation: cardIn 0.25s ease;
    }

    #modalBox p {
      font-size: 1rem;
      color: #a09880;
      font-style: italic;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .modal-btns { display: flex; gap: 10px; justify-content: center; }

    .modal-confirm {
      padding: 9px 22px;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      background: var(--red);
      color: #f0d8d8;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .modal-confirm:hover { background: var(--red-light); }

    .modal-cancel {
      padding: 9px 22px;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .modal-cancel:hover { border-color: var(--text-muted); color: var(--text); }

    /* ── Animations ── */
    @keyframes fadeDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:none} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(10px)}  to{opacity:1;transform:none} }
    @keyframes cardIn   { from{opacity:0;transform:translateY(12px)}  to{opacity:1;transform:none} }

    .stagger-1 { animation-delay: 0.05s; }
    .stagger-2 { animation-delay: 0.12s; }
    .stagger-3 { animation-delay: 0.19s; }
    .stagger-4 { animation-delay: 0.26s; }
    .stagger-5 { animation-delay: 0.33s; }
  </style>
</head>
<body>

<div class="wrapper">

  <nav class="top-nav">
    <a href="landing.html" class="back-link">Home</a>
    <a href="index.html" class="back-link">Journal</a>
    <a href="wellbeing.html" class="back-link">Wellbeing</a>
  </nav>

  <header>
    <span class="header-ornament">✦</span>
    <div class="header-arabic">سجل القلب</div>
    <h1>Journal History</h1>
    <div class="header-line"></div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" id="tabHistory" onclick="switchTab('history')">Entries</button>
    <button class="tab-btn" id="tabBookmarks" onclick="switchTab('bookmarks')">Saved Ayahs</button>
  </div>

  <div id="historyPane"></div>
  <div id="bookmarksPane" style="display:none;"></div>

</div>

<!-- Delete Modal -->
<div id="modalOverlay">
  <div id="modalBox">
    <p>Remove this entry from your journal?</p>
    <div class="modal-btns">
      <button class="modal-confirm" id="confirmDelete">Remove</button>
      <button class="modal-cancel" id="cancelDelete">Keep</button>
    </div>
  </div>
</div>

<script>
  let entryToDelete = null;
  let currentTab = 'history';

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tabHistory').classList.toggle('active', tab === 'history');
    document.getElementById('tabBookmarks').classList.toggle('active', tab === 'bookmarks');
    document.getElementById('historyPane').style.display = tab === 'history' ? 'block' : 'none';
    document.getElementById('bookmarksPane').style.display = tab === 'bookmarks' ? 'block' : 'none';
  }

  function emotionColor(e) {
    if (!e) return 'dim';
    const em = e.toLowerCase().trim();
    if (['peaceful','happy','reflective','content','hopeful','grateful'].includes(em)) return 'green';
    if (['hopeful','grateful','content'].includes(em)) return 'yellow';
    if (['sad','anxious','angry','stressed','lonely','heartbroken','tired','confused'].includes(em)) return 'red';
    return 'yellow';
  }

  function formatDate(ts) {
    if (!ts) return '';
    try {
      return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    } catch { return ''; }
  }

  async function loadHistory() {
    const pane = document.getElementById("historyPane");
    try {
      const res = await fetch("http://localhost:8000/history");
      const history = await res.json();
      pane.innerHTML = "";

      if (!history.length) {
        pane.innerHTML = `<div class="empty-state">No entries yet. Begin your reflection.</div>`;
        return;
      }

      history.slice().reverse().forEach((item, i) => {
        const entryId = history.length - 1 - i;
        const delay = Math.min(i * 0.07, 0.5);
        const bc = emotionColor(item.emotion_before);
        const ac = emotionColor(item.emotion_after);

        const afterHTML = item.emotion_after
          ? `<span class="arrow-sep">→</span>
             <span class="emo-label">After</span>
             <span class="emo-tag ${ac}">${item.emotion_after}</span>`
          : '';

        const card = document.createElement("div");
        card.className = "entry-card";
        card.style.animationDelay = delay + 's';
        card.innerHTML = `
          <div class="entry-meta">
            <span class="entry-date">${formatDate(item.timestamp)}</span>
            <button class="delete-btn" onclick="showModal(${entryId})" title="Delete entry">✕ Delete</button>
          </div>
          <div class="entry-text">${item.entry}</div>
          <div class="emotion-row">
            <span class="emo-label">Before</span>
            <span class="emo-tag ${bc}">${item.emotion_before}</span>
            ${afterHTML}
          </div>
        `;
        pane.appendChild(card);
      });

    } catch (err) {
      pane.innerHTML = `<div class="empty-state" style="color:#7a4040;">Could not load history. Check that the backend is running.</div>`;
    }
  }

  async function loadBookmarks() {
    const pane = document.getElementById("bookmarksPane");
    try {
      const res = await fetch("http://localhost:8000/bookmarks");
      const bookmarks = await res.json();
      pane.innerHTML = "";

      if (!bookmarks.length) {
        pane.innerHTML = `<div class="empty-state">No saved Ayahs yet.<br>Tap ☆ on any verse to save it.</div>`;
        return;
      }

      bookmarks.forEach((bm, i) => {
        const delay = Math.min(i * 0.07, 0.5);
        const card = document.createElement("div");
        card.className = "bookmark-card";
        card.style.animationDelay = delay + 's';
        card.innerHTML = `
          <button class="remove-bookmark-btn" title="Remove bookmark" onclick="removeBookmark(${bm.ayah_index}, this)">✕</button>
          <div class="bookmark-arabic">${bm.ayah_ar}</div>
          <div class="bookmark-english">${bm.ayah}</div>
          <div class="bookmark-ref">— Surah ${bm.surah} · ${bm.ayah_no}</div>
        `;
        pane.appendChild(card);
      });

    } catch (err) {
      pane.innerHTML = `<div class="empty-state" style="color:#7a4040;">Could not load bookmarks.</div>`;
    }
  }

  async function removeBookmark(ayahIndex, btn) {
    try {
      await fetch(`http://localhost:8000/bookmark/${ayahIndex}`, { method: "DELETE" });
      btn.closest('.bookmark-card').style.transition = 'opacity 0.3s';
      btn.closest('.bookmark-card').style.opacity = '0';
      setTimeout(() => loadBookmarks(), 350);
    } catch (err) { console.error(err); }
  }

  function showModal(id) {
    entryToDelete = id;
    document.getElementById("modalOverlay").classList.add("open");
  }
  function hideModal() {
    entryToDelete = null;
    document.getElementById("modalOverlay").classList.remove("open");
  }

  async function deleteEntry() {
    if (entryToDelete === null) return;
    try {
      const res = await fetch(`http://localhost:8000/delete-entry/${entryToDelete}`, { method: "DELETE" });
      const data = await res.json();
      if (data.message === "Deleted") { hideModal(); loadHistory(); }
    } catch (err) { console.error(err); }
  }

  document.getElementById("confirmDelete").addEventListener("click", deleteEntry);
  document.getElementById("cancelDelete").addEventListener("click", hideModal);
  document.getElementById("modalOverlay").addEventListener("click", (e) => {
    if (e.target === document.getElementById("modalOverlay")) hideModal();
  });

  window.onload = () => { loadHistory(); loadBookmarks(); };
</script>

</body>
</html>
